<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>
        当代音乐
    </title>
    <style>
        @import url(style.css);

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 0;
        }
        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* 乐谱列表 */
        .sheet-music-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0;
            padding: 40px 0;
        }

        .sheet-music-card {
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            gap: 0;
        }

        .sheet-image {
            width: 240px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            font-size: 64px;
        }

        .sheet-info {
            padding: 20px;
        }

        .sheet-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
        }

        .sheet-composer {
            color: #808080;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            nav ul {
                margin-top: 20px;
                justify-content: center;
            }

            .sheet-music-list {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

    </style>
</head>
<body>
<h1>当代音乐</h1>

    <br>
    <!-- 乐谱列表 -->
<section class="container">
    <div class="sheet-music-list">
        <!-- 乐谱卡片 1 -->
        <div class="sheet-music-card">
            <div class="sheet-image">
                <img src="/image/Cheston Rewly-Image Rain.jpg" width="200pt">
            </div>
            <div class="sheet-info">
                <div class="sheet-title"><a href="https://github.com/OYAMIBE/oyamibe.github.io/releases/download/SCORES/Cheston.Rewly-Image.Rain.pdf">印象　雨<br>Image　Rain</a></div>
                <div class="sheet-composer">Cheston Rewly</div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
